<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Profile Analysis | Sonar Marketing</title>
    <meta name="description" content="Request a custom strategy session with Sonar Marketing.">
    <link rel="icon" type="image/svg+xml" href="assets/images/Sonar Icon 1.svg">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css?v=8">

    <style>
        /* Two-Column Layout */
        .split-booking-section {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1.1fr;
            background: #ffffff;
            padding: 140px 20px 60px; /* Restored top padding, matched lateral padding to logo */
            gap: 100px;
            max-width: 1200px; /* Matched to global container width */
            margin: 0 auto;
            align-items: start;
        }

        /* Left Side Content */
        .booking-content {
            padding-top: 0; /* Align with first input border */
        }

        .booking-heading {
            font-family: 'Outfit', sans-serif;
            font-size: 2.85rem; /* Maximum size without wrapping */
            font-weight: 500;
            line-height: 1.1;
            margin-bottom: 24px;
            color: #111827;
            white-space: nowrap; /* Forces text to stay on one line */
        }

        .booking-subtext {
            font-family: 'Inter', sans-serif;
            font-size: 1.035rem; /* Reduced 10% from 1.15rem */
            line-height: 1.6;
            color: #4b5563;
            margin-bottom: 40px;
        }

        .benefits-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .benefit-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.982rem; /* Increased 5% from 0.935rem */
            font-weight: 500;
            color: #111827;
        }

        .tick-icon {
            color: #111827;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 21px; /* Increased 5% from 20px */
            height: 21px;
        }

        /* Right Side Form */
        .naked-form-container {
            width: 100%;
            max-width: 605px;
        }

        .modern-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .modern-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        .modern-input {
            width: 100%;
            padding: 18px 22px;
            background: #fdfdfd;
            border: 1.1px solid #d1d5db;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            color: #111827;
            transition: all 0.3s ease;
            outline: none;
        }

        .modern-input:focus {
            background: #ffffff;
            border-color: #111827;
            box-shadow: 0 0 0 3px rgba(17, 24, 39, 0.05);
        }

        .radio-section {
            margin-top: 10px;
        }

        .radio-label-main {
            display: block;
            font-family: 'Outfit', sans-serif;
            font-weight: 400;
            font-size: 1.05rem;
            margin-bottom: 12px;
            color: #111827;
        }

        .modern-radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
        }

        .modern-radio-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f9fafb;
            padding: 12px 20px;
            border: 1.1px solid #d1d5db;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.81rem; /* Reduced 10% from 0.9rem */
            color: #111827;
        }

        .modern-radio-item input[type="radio"] {
            accent-color: #111827;
        }

        @media (max-width: 1024px) {
            .split-booking-section {
                grid-template-columns: 1fr;
                padding: 25vh 40px 60px; /* Reduced to 25vh to match Discovery level */
                gap: 60px;
            }
            .booking-heading {
                font-size: 2.8rem;
            }
        }

        @media (max-width: 640px) {
            .split-booking-section {
                padding: 25vh 20px 60px; /* Reduced to 25vh to match Discovery level */
            }
            .modern-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <!-- Logo Only Navigation -->
    <nav class="navbar" style="background: transparent; backdrop-filter: none; box-shadow: none; border: none;">
        <div class="container nav-container" style="justify-content: flex-start;">
            <a href="/" class="logo">
                <img src="assets/images/Sonar Landscape Logo 2.svg" alt="Sonar Marketing" width="180">
            </a>
        </div>
    </nav>

    <main class="split-booking-section">
        <!-- Left Content -->
        <div class="booking-content reveal">
            <h1 class="booking-heading">Free Profile Analysis</h1>
            <p class="booking-subtext">
                Fill out the form and we'll send you a personalised analysis, that will tell you what needs to happen to rank in the top 3.
            </p>
            
            <ul class="benefits-list">
                <li class="benefit-item">
                    <span class="tick-icon">
                        <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 7 9 18 4 13"></polyline></svg>
                    </span>
                    No costs
                </li>
                <li class="benefit-item">
                    <span class="tick-icon">
                        <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 7 9 18 4 13"></polyline></svg>
                    </span>
                    No obligations
                </li>
                <li class="benefit-item">
                    <span class="tick-icon">
                        <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 7 9 18 4 13"></polyline></svg>
                    </span>
                    No annoying sales pitch
                </li>
            </ul>
        </div>

        <!-- Right Form -->
        <div class="naked-form-container reveal">
            <form action="https://submit-form.com/IXeT1TMMF" method="POST" id="analysis-form" class="modern-form">
                <!-- Formspark Redirect & Honeypot -->
                                <input type="hidden" name="_next" value="https://sonarmarketing.io/thanks" />
                <input type="text" name="_gotcha" style="display:none" />

                <div class="input-wrapper">
                    <input type="text" name="full-name" class="modern-input" placeholder="Full Name *" required>
                </div>

                <div class="modern-row">
                    <div class="input-wrapper">
                        <input type="email" name="email" class="modern-input" placeholder="Email *" required>
                    </div>
                    <div class="input-wrapper">
                        <input type="tel" name="phone" class="modern-input" placeholder="Phone Number *" required>
                    </div>
                </div>

                <div class="modern-row">
                    <div class="input-wrapper">
                        <input type="url" name="website" class="modern-input" placeholder="Website URL *" required>
                    </div>
                    <div class="input-wrapper">
                        <input type="url" name="maps-url" class="modern-input" placeholder="Your Google Maps URL *" required>
                    </div>
                </div>

                <div class="radio-section">
                    <span class="radio-label-main">By when do you want to solve this problem? *</span>
                    <div class="modern-radio-group">
                        <label class="modern-radio-item">
                            <input type="radio" name="timeline" value="today" required>
                            <span>Today</span>
                        </label>
                        <label class="modern-radio-item">
                            <input type="radio" name="timeline" value="tomorrow">
                            <span>Tomorrow</span>
                        </label>
                        <label class="modern-radio-item">
                            <input type="radio" name="timeline" value="few-weeks">
                            <span>In a few weeks</span>
                        </label>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary full-width" style="height: 64px; border-radius: 12px;">
                    Submit
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </form>
        </div>
    </main>

    <script src="assets/js/script.js?v=4"></script>
</body>

</html>
